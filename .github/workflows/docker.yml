name: Docker ci pipeline

on:
  workflow_dispatch:

#on:
#  push:
    # branches:
    #   - main



jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code 
        uses: actions/checkout@v4

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }} -f ./docker/nginx-project/dockerfile docker/nginx-project

      - name: Docker push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}

      - name: Read ec2 host IP 
        id: hostip
        run: echo "HOST=$(tail -n -1 controller_setup/ansible/inventory.ini)" >> $GITHUB_ENV

      - name: Image deployment on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}


          Script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}

            docker rm -f mysite || true

            docker run -d -p 8080:80 --name mysite ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}